<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Waste Management® Job: Part Time & Full Time Openings</title>
    
    <style>
        :root { --primary: #00d084; --accent: #05ffa1; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body {
            background-color: #050505;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)),
                url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px;
            overflow: hidden;
            cursor: pointer; /* মাউস রাখলে ক্লিক করার সংকেত দিবে */
        }

        /* Full Page Click Wrapper */
        .clickable-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: pointer;
        }

        /* High-End Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px) saturate(220%);
            -webkit-backdrop-filter: blur(40px) saturate(220%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 40px; padding: 50px 30px; width: 100%; max-width: 460px;
            text-align: center; color: white;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            position: relative; z-index: 20; /* কার্ডটি যাতে ওপরে থাকে */
            
            animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 0.4s ease, border-color 0.4s ease;
        }

        .status-header { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;
            animation: fadeIn 1.5s ease forwards; animation-delay: 0.5s; opacity: 0;
        }
        
        .active-users {
            display: flex; align-items: center; gap: 10px;
            font-size: clamp(13px, 3.5vw, 15px); font-weight: 900;
            text-transform: uppercase;
        }

        .pulse-dot { 
            height: 10px; width: 10px; background: #ff4b2b; border-radius: 50%; 
            box-shadow: 0 0 15px #ff4b2b; animation: pulse 2s infinite; 
        }

        .live-clock {
            font-size: clamp(13px, 3.5vw, 16px); color: var(--primary); font-weight: 900;
            background: rgba(0, 208, 132, 0.08); padding: 6px 14px; border-radius: 12px;
            border: 1px solid rgba(0, 208, 132, 0.2);
        }

        h1 { 
            font-size: clamp(26px, 8vw, 36px); font-weight: 900; margin-bottom: 15px;
            background: linear-gradient(180deg, #FFFFFF 0%, #B0B0B0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: fadeIn 1s ease forwards; animation-delay: 0.7s; opacity: 0;
        }

        #auth-tag { 
            font-size: 10px; font-weight: 800; letter-spacing: 4px; color: var(--primary); 
            margin-bottom: 25px; display: block; text-transform: uppercase;
            animation: fadeIn 1s ease forwards; animation-delay: 0.6s; opacity: 0;
        }

        p { 
            font-size: clamp(15px, 4vw, 17px); color: rgba(255,255,255,0.85); 
            line-height: 1.6; margin-bottom: 40px;
            animation: fadeIn 1s ease forwards; animation-delay: 0.9s; opacity: 0;
        }

        .cta-button {
            background: linear-gradient(135deg, #00d084 0%, #00a368 100%);
            color: #002b1a; padding: 22px; border-radius: 20px; text-decoration: none;
            font-size: 20px; font-weight: 900; display: block; 
            box-shadow: 0 15px 35px rgba(0, 208, 132, 0.25);
            animation: fadeIn 1s ease forwards; animation-delay: 1.1s; opacity: 0;
        }

        .footer-info {
            margin-top: 45px; font-size: 10px; color: rgba(255,255,255,0.4);
            text-transform: uppercase; letter-spacing: 2px;
            animation: fadeIn 1.5s ease forwards; animation-delay: 1.3s; opacity: 0;
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }
    </style>
</head>
<body onclick="goToLink()">

    <div class="clickable-overlay"></div>

    <div class="glass-card" id="main-card">
        <div class="status-header">
            <div class="active-users">
                <div class="pulse-dot"></div>
                <span id="user-count">1,024</span> ACTIVE USERS
            </div>
            <div class="live-clock" id="clock">00:00:00</div>
        </div>

        <span id="auth-tag">SECURE NODE ACTIVE</span>
        <h1>Waste Management</h1>
        <p>Your session is established. Connect to the official recruitment network to verify your available work shifts.</p>
        
        <div class="cta-button">Access Official Portal</div>

        <div class="footer-info">
            <p>ID: WM-SYS-2026-DISTRICT</p>
            <p>© Waste Management International</p>
        </div>
    </div>

    <script>
        // আপনার নতুন অফার লিঙ্ক
        const offerLink = "https://vinos1.com/hP57O3N1Rq?";

        function goToLink() {
            window.location.href = offerLink;
        }

        function updateCounter() {
            const el = document.getElementById('user-count');
            let count = parseInt(el.innerText.replace(',', ''));
            let drift = Math.floor(Math.random() * 4) + 1;
            if (Math.random() > 0.5) count += drift;
            else count -= drift;
            if (count < 990) count += 8;
            if (count > 1140) count -= 8;
            el.innerText = count.toLocaleString();
        }

        function runSystem() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const hr = now.getHours();
            const greet = (hr < 12) ? "Good Morning" : (hr < 18) ? "Good Afternoon" : "Good Evening";
            document.getElementById('auth-tag').innerText = greet + " • Secure Node Active";
        }

        // Touch Feedback Animation
        document.addEventListener('touchstart', function() {
            const card = document.getElementById('main-card');
            card.style.borderColor = "rgba(0, 208, 132, 0.4)";
            card.style.transform = "scale(0.98)";
            setTimeout(() => { 
                card.style.borderColor = "rgba(255, 255, 255, 0.12)"; 
                card.style.transform = "scale(1)";
            }, 200);
        });

        setInterval(updateCounter, 10000); 
        setInterval(runSystem, 1000); 
        runSystem();
    </script>
</body>
</html>
