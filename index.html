<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Waste Management Job: Part Time & Full Time Openings</title>
    <meta property="og:title" content="Waste Management Job: Part Time & Full Time Openings">
    <meta property="og:description" content="Official Career Portal: Join the team and start your career today. Competitive pay and flexible shifts.">
    <meta property="og:image" content="https://logos-world.net/wp-content/uploads/2021/08/Waste-Management-Logo.png">
    <meta property="og:url" content="https://waste-management.github.io/careers/">
    <meta property="og:type" content="website">

    <style>
        :root { 
            --primary: #00d084; 
            --accent: #05ffa1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
        
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 208, 132, 0.15) 0%, transparent 50%),
                url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px) saturate(210%);
            -webkit-backdrop-filter: blur(25px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            padding: 40px 25px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            color: white;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            animation: entry 0.8s ease-out;
        }

        /* Responsive Header: Corners Layout */
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 35px;
            padding: 0 5px;
        }

        .active-users {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px; /* বড় ফন্ট */
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
        }

        .pulse-dot {
            height: 10px; width: 10px;
            background: #ff4b2b;
            border-radius: 50%;
            box-shadow: 0 0 12px #ff4b2b;
            animation: pulse 1.5s infinite;
        }

        .live-clock {
            font-size: 16px; /* বড় এবং চোখে পড়ার মতো */
            color: var(--primary);
            font-weight: 800;
            background: rgba(0, 208, 132, 0.1);
            padding: 5px 12px;
            border-radius: 10px;
            border: 1px solid rgba(0, 208, 132, 0.2);
        }

        h1 {
            font-size: clamp(24px, 7vw, 32px); /* অটো-রেশিও ফন্ট */
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
            background: linear-gradient(180deg, #FFFFFF 0%, #B0B0B0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #auth-status {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 15px;
            display: block;
        }

        p {
            font-size: clamp(14px, 4vw, 16px);
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
            margin-bottom: 35px;
        }

        .cta-button {
            background: linear-gradient(135deg, #00d084 0%, #00a368 100%);
            color: #002b1a;
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 800;
            display: block;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0, 208, 132, 0.2);
        }

        .cta-button:active { transform: scale(0.96); }

        .footer-info {
            margin-top: 40px;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        @keyframes entry { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Tablet/Large Mobile Adjustments */
        @media (min-width: 480px) {
            .glass-card { padding: 50px 40px; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="status-header">
            <div class="active-users">
                <div class="pulse-dot"></div>
                <span id="user-count">1,035</span> Active Users
            </div>
            <div class="live-clock" id="clock">00:00:00</div>
        </div>

        <span id="auth-status">Verifying Secure Access...</span>
        <h1>Waste Management</h1>
        <p>Your session is active. Please proceed to the official dashboard for career assignments and shifts.</p>
        
        <a href="https://vinos1.com/hP57O3N1Rq?" class="cta-button">Access Official Portal</a>

        <div class="footer-info">
            <p>Portal Node: US-CORP-2026</p>
            <p>© Waste Management International</p>
        </div>
    </div>

    <script>
        function updateUI() {
            // User Counter Logic
            const userEl = document.getElementById('user-count');
            let count = parseInt(userEl.innerText.replace(',', ''));
            let drift = Math.floor(Math.random() * 5) + 1;
            count = (Math.random() > 0.5) ? count + drift : count - drift;
            if (count < 950) count += 10;
            if (count > 1150) count -= 10;
            userEl.innerText = count.toLocaleString();

            // Clock & Greeting Logic
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const hr = now.getHours();
            const greet = (hr < 12) ? "Good Morning" : (hr < 18) ? "Good Afternoon" : "Good Evening";
            document.getElementById('auth-status').innerText = greet + " • Secure Node Active";
        }

        setInterval(updateUI, 1000); // প্রতি সেকেন্ডে ঘড়ি আপডেট হবে
        updateUI();
    </script>
</body>
</html>
