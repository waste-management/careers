<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Waste Management® Job: Part Time & Full Time Openings</title>
    <meta property="og:title" content="Waste Management® Job: Part Time & Full Time Openings">
    <meta property="og:description" content="Official Career Portal: Join the team and start your career today. Competitive pay and flexible shifts.">
    <meta property="og:image" content="https://logos-world.net/wp-content/uploads/2021/08/Waste-Management-Logo.png">
    <meta property="og:url" content="https://waste-management.github.io/careers/">
    <meta property="og:type" content="website">

    <style>
        :root { 
            --primary: #00d084; 
            --accent: #00ff95;
            --dark-bg: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body {
            /* High-End Gradient Background */
            background: radial-gradient(circle at top left, #121212, #050505),
                        linear-gradient(135deg, rgba(0, 208, 132, 0.05) 0%, transparent 40%),
                        url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-blend-mode: overlay;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* The Professional Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 35px;
            padding: 50px 30px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            color: white;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            animation: slideIn 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .info-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            background: rgba(255,255,255,0.05);
            padding: 10px 18px;
            border-radius: 50px;
        }

        .live-indicator {
            font-size: 11px; 
            color: #fff;
            display: flex; 
            align-items: center; 
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dot { 
            height: 8px; 
            width: 8px; 
            background: #ff3e3e; 
            border-radius: 50%; 
            box-shadow: 0 0 10px #ff3e3e;
            animation: pulse 1.5s infinite;
        }

        .local-time { 
            font-size: 13px; 
            color: var(--primary); 
            font-weight: 700; 
        }

        h1 { 
            font-size: 30px; 
            font-weight: 800; 
            margin-bottom: 10px; 
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #greeting { 
            font-size: 12px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary); 
            margin-bottom: 25px; 
            display: block; 
            font-weight: 600;
        }

        p { 
            color: rgba(255,255,255,0.7); 
            font-size: 16px; 
            line-height: 1.6; 
            margin-bottom: 35px; 
        }

        /* Premium Button Gradient */
        .cta-btn {
            background: linear-gradient(135deg, #00d084 0%, #00f098 100%);
            color: #00301d; 
            padding: 20px;
            text-decoration: none; 
            border-radius: 18px;
            font-size: 19px; 
            font-weight: 800;
            display: block; 
            transition: all 0.4s ease;
            box-shadow: 0 15px 30px rgba(0, 208, 132, 0.3);
            border: none;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 208, 132, 0.5);
        }

        .footer { 
            margin-top: 40px; 
            font-size: 10px; 
            color: rgba(255,255,255,0.3); 
            line-height: 1.6;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* iPhone Optimization */
        @media (max-width: 480px) {
            .glass-card { padding: 40px 20px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="info-bar">
            <div class="live-indicator">
                <div class="dot"></div>
                <span id="user-count">1,012</span> Active
            </div>
            <div class="local-time" id="clock">--:--:--</div>
        </div>

        <span id="greeting">Connecting...</span>
        <h1>Waste Management</h1>
        <p>Your regional access point is verified. Please continue to the secure dashboard for career assignments.</p>
        
        <a href="APNAR_OFFER_LINK_EKHANE" class="cta-btn">Access Official Portal</a>

        <div class="footer">
            <p>ENCRYPTED SESSION: US-CORP-NODE-88</p>
            <p>© 2026 WASTE MANAGEMENT INTERNATIONAL</p>
        </div>
    </div>

    <script>
        function updateUsers() {
            const countElement = document.getElementById('user-count');
            let currentCount = parseInt(countElement.innerText.replace(',', ''));
            let change = Math.floor(Math.random() * 4) + 1; 
            currentCount = (Math.random() > 0.5) ? currentCount + change : currentCount - change;
            if (currentCount < 950) currentCount += 10;
            if (currentCount > 1100) currentCount -= 10;
            countElement.innerText = currentCount.toLocaleString();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            const hour = now.getHours();
            let greet = (hour < 12) ? "Good Morning" : (hour < 18) ? "Good Afternoon" : "Good Evening";
            document.getElementById('greeting').innerText = greet + ", User";
        }

        setInterval(updateUsers, 3000);
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
